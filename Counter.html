<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Timer</title>
<style>
body {
    margin: 0;
    background: white;
    color: #00c853;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#timer {
    font-size: 22vw;
    font-weight: 900;
    transition: transform 0.25s;
}

.pulse {
    transform: scale(1.15);
}

#startBtn {
    position: absolute;
    bottom: 80px;
    font-size: 28px;
    padding: 15px 45px;
    border: none;
    border-radius: 12px;
    background: #00c853;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

#progressContainer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 25px;
    background: #eee;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: #00c853;
    transition: width 1s linear;
}
</style>
</head>
<body>

<div id="timer">30</div>
<button id="startBtn">START</button>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<!-- Sons WAV locaux -->
<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>
let time = 30;
const total = 30;

const timer = document.getElementById("timer");
const btn = document.getElementById("startBtn");
const bar = document.getElementById("progressBar");

const startSound = document.getElementById("startSound");
const midSound = document.getElementById("midSound");
const endSound = document.getElementById("endSound");

btn.onclick = () => {
    btn.style.display = "none";
    startSound.play(); // iOS nécessite interaction pour jouer le son

    const interval = setInterval(() => {
        time--;
        timer.textContent = time;

        timer.classList.add("pulse");
        setTimeout(() => timer.classList.remove("pulse"), 200);

        let progress = ((total - time) / total) * 100;
        bar.style.width = progress + "%";

        if (time === 15) midSound.play();
        if (time <= 0) {
            clearInterval(interval);
            timer.textContent = ""; // GO retiré
            endSound.play();
        }
    }, 1000);
};
</script>

</body>
</html>
