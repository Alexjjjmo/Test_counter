<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Timer</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:white;
  color:#993399;
  font-family:monospace;
  overflow:hidden;
}

#timer{
  font-weight:900;
  line-height:1;
  text-align:center;
  user-select:none;
  white-space:nowrap;
}
</style>
</head>

<body>

<div id="timer">30</div>

<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>
const total = 30

let time = total
let interval = null
let paused = false
let running = false

const timer = document.getElementById("timer")

const startSound = document.getElementById("startSound")
const midSound = document.getElementById("midSound")
const endSound = document.getElementById("endSound")

function fitTimer(){
  let low = 10
  let high = 2000
  let best = 10

  const maxWidth = window.innerWidth * 0.95
  const maxHeight = window.innerHeight * 0.95

  while(low <= high){
    const mid = Math.floor((low + high) / 2)
    timer.style.fontSize = mid + "px"

    if(timer.offsetWidth <= maxWidth && timer.offsetHeight <= maxHeight){
      best = mid
      low = mid + 1
    }else{
      high = mid - 1
    }
  }

  timer.style.fontSize = best + "px"
}

function updateDisplay(){
  timer.textContent = String(time).padStart(2,"0")
  fitTimer()
}

function runTimer(){

  if(paused) return

  time--
  updateDisplay()

  if(time === 15){
    midSound.play()
  }

  if(time <= 0){
    clearInterval(interval)
    interval = null
    running = false
    time = 0
    timer.style.color = "#f44336"
    updateDisplay()
    endSound.play()
  }
}

function startTimer(){

  if(running) return

  time = total
  paused = false
  running = true

  timer.style.color = "#993399"
  updateDisplay()

  startSound.play()
  interval = setInterval(runTimer,1000)
}

function stopTimer(){

  clearInterval(interval)
  interval = null

  running = false
  paused = false
  time = total

  timer.style.color = "#993399"
  updateDisplay()
}

document.addEventListener("keydown",(e)=>{

  if(e.code==="Enter"){
    e.preventDefault()
    running ? stopTimer() : startTimer()
  }

  if(e.code==="Space"){
    e.preventDefault()
    if(running){
      paused = !paused
    }
  }
})

window.addEventListener("resize", updateDisplay)

updateDisplay()
</script>

</body>
</html>
