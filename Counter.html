<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>HIIT Timer</title>

<style>

body{
margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:white;
color:#993399;

font-family:monospace;

overflow:hidden;
}

/* CHIFFRES MAX */

#timer{
font-size:100vw;
font-weight:900;
line-height:1;
user-select:none;
}

</style>

</head>

<body>

<div id="timer">30</div>

<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>

const total = 30

let time = total
let interval = null
let paused = false
let running = false

const timer = document.getElementById("timer")

const startSound = document.getElementById("startSound")
const midSound = document.getElementById("midSound")
const endSound = document.getElementById("endSound")

function updateDisplay(){
timer.textContent = String(time).padStart(2,"0")
}

function runTimer(){

if(paused) return

time--

updateDisplay()

if(time === 15){
midSound.play()
}

if(time <= 0){

clearInterval(interval)
running = false

timer.textContent = "00"
timer.style.color = "#f44336"

endSound.play()

}

}

function startTimer(){

if(running) return

time = total
paused = false
running = true

timer.style.color = "#993399"

updateDisplay()

startSound.play()

interval = setInterval(runTimer,1000)

}

function stopTimer(){

clearInterval(interval)

running = false
paused = false
time = total

timer.style.color = "#993399"

updateDisplay()

}

document.addEventListener("keydown",(e)=>{

if(e.code==="Enter"){

e.preventDefault()

running ? stopTimer() : startTimer()

}

if(e.code==="Space"){

e.preventDefault()

if(running){
paused = !paused
}

}

})

updateDisplay()

</script>

</body>
</html>
