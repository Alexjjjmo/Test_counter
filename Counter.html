<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HIIT Timer</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      color: #993399;
      font-family: Arial, Helvetica, sans-serif;
    }

    #timer {
      font-size: 22vw;
      font-weight: 900;
      user-select: none;
    }

    #progressContainer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 25px;
      background: #eee;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: #00c853;
      transition: width 1s linear;
    }
  </style>
</head>
<body>

  <div id="timer">30</div>

  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <audio id="startSound" src="start.wav"></audio>
  <audio id="midSound" src="mid.wav"></audio>
  <audio id="endSound" src="end.wav"></audio>

  <script>
    const total = 30;
    let time = total;
    let interval = null;
    let paused = false;
    let running = false;

    const timer = document.getElementById("timer");
    const progressBar = document.getElementById("progressBar");

    const startSound = document.getElementById("startSound");
    const midSound = document.getElementById("midSound");
    const endSound = document.getElementById("endSound");

    function updateDisplay() {
      timer.textContent = time;
      progressBar.style.width = ((total - time) / total) * 100 + "%";
    }

    function runTimer() {
      if (paused) return;

      time--;
      updateDisplay();

      if (time === 15) {
        midSound.play();
      }

      if (time <= 0) {
        clearInterval(interval);
        interval = null;
        running = false;

        time = 0;
        timer.textContent = "0";
        timer.style.color = "#f44336";
        progressBar.style.width = "100%";

        endSound.play();
      }
    }

    function startTimer() {
      if (running) return;

      time = total;
      paused = false;
      running = true;

      timer.style.color = "#993399";
      updateDisplay();
      startSound.play();

      interval = setInterval(runTimer, 1000);
    }

    function stopTimer() {
      clearInterval(interval);
      interval = null;
      running = false;
      paused = false;
      time = total;

      timer.style.color = "#993399";
      updateDisplay();
    }

    document.addEventListener("keydown", (e) => {
      if (e.code === "Enter") {
        e.preventDefault();
        running ? stopTimer() : startTimer();
      }

      if (e.code === "Space") {
        e.preventDefault();
        if (running) {
          paused = !paused;
        }
      }
    });

    updateDisplay();
  </script>

</body>
</html>
