<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Timer</title>

<style>
body{
  margin:0;
  background:white;
  color:#993399;
  font-family:Arial, Helvetica, sans-serif;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
  position:relative;
}

/* TIMER */

#timer{
  font-size:22vw;
  font-weight:900;
  z-index:5;
  position:relative;
}

/* PROGRESS BAR */

#progressContainer{
  position:absolute;
  bottom:0;
  width:100%;
  height:25px;
  background:#eee;
  z-index:10;
}

#progressBar{
  height:100%;
  width:0%;
  background:#00c853;
  transition:width 1s linear;
}

/* LION */

#lion{
  position:absolute;
  width:170px;
  height:150px;
  display:none;
  pointer-events:none;
  z-index:3;
  transform-origin:center center;
}

/* Rebond général du patinage */
#lion.skating{
  animation:lionBounce .32s infinite alternate ease-in-out;
}

@keyframes lionBounce{
  from{ margin-top:0; }
  to{ margin-top:-6px; }
}

/* Partie principale */
#lion .lion-wrap{
  position:relative;
  width:170px;
  height:150px;
}

/* Queue */
#lion .tail{
  position:absolute;
  width:52px;
  height:10px;
  background:#c97d14;
  border-radius:10px;
  left:16px;
  top:72px;
  transform-origin:46px 5px;
  animation:tailSwing .35s infinite alternate ease-in-out;
}

#lion .tail-tip{
  position:absolute;
  width:16px;
  height:16px;
  background:#7a3e00;
  border-radius:50%;
  left:-6px;
  top:-3px;
}

@keyframes tailSwing{
  from{ transform:rotate(18deg); }
  to{ transform:rotate(-14deg); }
}

/* Corps */
#lion .body{
  position:absolute;
  width:88px;
  height:52px;
  left:52px;
  top:52px;
  background:#d88a1d;
  border-radius:30px;
  box-shadow:inset -6px -4px 0 rgba(0,0,0,.06);
}

/* Ventre */
#lion .belly{
  position:absolute;
  width:42px;
  height:24px;
  left:84px;
  top:73px;
  background:#f2c67a;
  border-radius:20px;
}

/* Tête */
#lion .head{
  position:absolute;
  width:56px;
  height:56px;
  left:102px;
  top:22px;
  background:#d88a1d;
  border-radius:50%;
  z-index:3;
}

/* Crinière */
#lion .mane{
  position:absolute;
  width:76px;
  height:76px;
  left:92px;
  top:12px;
  background:#8b4513;
  border-radius:50%;
  z-index:2;
}

/* Oreilles */
#lion .ear{
  position:absolute;
  width:14px;
  height:14px;
  background:#8b4513;
  border-radius:50%;
  top:16px;
  z-index:1;
}
#lion .ear.left{ left:100px; }
#lion .ear.right{ left:146px; }

/* Museau */
#lion .snout{
  position:absolute;
  width:24px;
  height:16px;
  left:122px;
  top:48px;
  background:#f6d39a;
  border-radius:12px;
  z-index:4;
}

/* Yeux */
#lion .eye{
  position:absolute;
  width:6px;
  height:6px;
  background:#222;
  border-radius:50%;
  top:40px;
  z-index:5;
}
#lion .eye.left{ left:120px; }
#lion .eye.right{ left:136px; }

/* Nez */
#lion .nose{
  position:absolute;
  width:8px;
  height:6px;
  left:130px;
  top:50px;
  background:#5a2c00;
  border-radius:50%;
  z-index:6;
}

/* Sourire */
#lion .mouth{
  position:absolute;
  width:12px;
  height:8px;
  left:128px;
  top:57px;
  border-bottom:2px solid #5a2c00;
  border-radius:0 0 12px 12px;
  z-index:6;
}

/* Bras */
#lion .arm{
  position:absolute;
  width:12px;
  height:34px;
  background:#d88a1d;
  border-radius:10px;
  transform-origin:top center;
  z-index:1;
}

#lion .arm.left{
  left:66px;
  top:60px;
  animation:armLeftSkate .34s infinite alternate ease-in-out;
}

#lion .arm.right{
  left:126px;
  top:58px;
  animation:armRightSkate .34s infinite alternate ease-in-out;
}

#lion .paw{
  position:absolute;
  width:13px;
  height:13px;
  background:#c97d14;
  border-radius:50%;
  bottom:-4px;
  left:-1px;
}

/* Jambes */
#lion .leg{
  position:absolute;
  width:14px;
  height:42px;
  background:#c97d14;
  border-radius:10px;
  transform-origin:top center;
  z-index:1;
}

#lion .leg.left{
  left:78px;
  top:92px;
  animation:legLeftSkate .34s infinite alternate ease-in-out;
}

#lion .leg.right{
  left:112px;
  top:92px;
  animation:legRightSkate .34s infinite alternate ease-in-out;
}

/* Rollers */
#lion .skate{
  position:absolute;
  width:28px;
  height:8px;
  background:#333;
  border-radius:6px;
  bottom:-2px;
  left:-7px;
}

#lion .wheel{
  position:absolute;
  width:6px;
  height:6px;
  background:#00c853;
  border-radius:50%;
  bottom:-4px;
  animation:wheelSpin .16s linear infinite;
}
#lion .wheel.w1{ left:3px; }
#lion .wheel.w2{ left:11px; }
#lion .wheel.w3{ left:19px; }

@keyframes wheelSpin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* Animations de patinage */
@keyframes armLeftSkate{
  from{ transform:rotate(-35deg); }
  to{ transform:rotate(18deg); }
}

@keyframes armRightSkate{
  from{ transform:rotate(22deg); }
  to{ transform:rotate(-30deg); }
}

@keyframes legLeftSkate{
  from{ transform:rotate(28deg); }
  to{ transform:rotate(-26deg); }
}

@keyframes legRightSkate{
  from{ transform:rotate(-26deg); }
  to{ transform:rotate(28deg); }
}

/* Pause */
#lion.paused .arm,
#lion.paused .leg,
#lion.paused .tail,
#lion.paused .wheel,
#lion.paused{
  animation-play-state:paused !important;
}

/* Fin étoile de mer */
#lion.star{
  animation:none !important;
  width:190px;
  height:170px;
}

#lion.star .tail,
#lion.star .arm,
#lion.star .leg,
#lion.star .wheel{
  animation:none !important;
}

#lion.star .tail{
  left:8px;
  top:74px;
  transform:rotate(8deg);
}

#lion.star .arm.left{
  left:56px;
  top:58px;
  transform:rotate(-75deg);
}

#lion.star .arm.right{
  left:136px;
  top:58px;
  transform:rotate(75deg);
}

#lion.star .leg.left{
  left:76px;
  top:94px;
  transform:rotate(42deg);
}

#lion.star .leg.right{
  left:118px;
  top:94px;
  transform:rotate(-42deg);
}

/* BULLE */

#bubble{
  position:absolute;
  background:white;
  border:3px solid #993399;
  border-radius:18px;
  padding:10px 14px;
  font-weight:700;
  font-size:20px;
  display:none;
  z-index:20;
  white-space:nowrap;
  box-shadow:0 6px 12px rgba(0,0,0,.08);
}

#bubble:after{
  content:"";
  position:absolute;
  left:20px;
  bottom:-14px;
  width:0;
  height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:14px solid #993399;
}

#bubble:before{
  content:"";
  position:absolute;
  left:22px;
  bottom:-10px;
  width:0;
  height:0;
  border-left:8px solid transparent;
  border-right:8px solid transparent;
  border-top:12px solid white;
  z-index:1;
}
</style>
</head>
<body>

<div id="timer">30</div>

<div id="lion">
  <div class="lion-wrap">
    <div class="tail"><div class="tail-tip"></div></div>

    <div class="ear left"></div>
    <div class="ear right"></div>
    <div class="mane"></div>
    <div class="head"></div>
    <div class="snout"></div>
    <div class="eye left"></div>
    <div class="eye right"></div>
    <div class="nose"></div>
    <div class="mouth"></div>

    <div class="body"></div>
    <div class="belly"></div>

    <div class="arm left"><div class="paw"></div></div>
    <div class="arm right"><div class="paw"></div></div>

    <div class="leg left">
      <div class="skate">
        <div class="wheel w1"></div>
        <div class="wheel w2"></div>
        <div class="wheel w3"></div>
      </div>
    </div>

    <div class="leg right">
      <div class="skate">
        <div class="wheel w1"></div>
        <div class="wheel w2"></div>
        <div class="wheel w3"></div>
      </div>
    </div>
  </div>
</div>

<div id="bubble">Bonne année !</div>

<div id="progressContainer">
  <div id="progressBar"></div>
</div>

<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>
let time = 30
const total = 30

let interval = null
let paused = false
let running = false

const timer = document.getElementById("timer")
const bar = document.getElementById("progressBar")
const startSound = document.getElementById("startSound")
const midSound = document.getElementById("midSound")
const endSound = document.getElementById("endSound")
const lion = document.getElementById("lion")
const bubble = document.getElementById("bubble")

let lionX = 80
let lionY = 120
let targetX = 200
let targetY = 180
let lionAnim = null

const LION_W = 170
const LION_H = 150

function playSound(audioEl){
  if(!audioEl) return
  audioEl.currentTime = 0
  audioEl.play().catch(() => {})
}

function getTimerSafeZone(){
  const rect = timer.getBoundingClientRect()
  const margin = 60

  return {
    left: rect.left - margin,
    right: rect.right + margin,
    top: rect.top - margin,
    bottom: rect.bottom + margin
  }
}

function rectIntersectsSafeZone(x, y, w, h){
  const zone = getTimerSafeZone()
  return !(
    x + w < zone.left ||
    x > zone.right ||
    y + h < zone.top ||
    y > zone.bottom
  )
}

function clampLionPosition(width = LION_W, height = LION_H){
  const maxX = window.innerWidth - width
  const maxY = window.innerHeight - height - 25

  if(lionX < 0) lionX = 0
  if(lionY < 0) lionY = 0
  if(lionX > maxX) lionX = maxX
  if(lionY > maxY) lionY = maxY
}

function newTarget(){
  const maxX = window.innerWidth - LION_W
  const maxY = window.innerHeight - LION_H - 25

  let tries = 0
  do{
    targetX = Math.random() * Math.max(20, maxX - 20)
    targetY = Math.random() * Math.max(20, maxY - 20)
    tries++
  }while(rectIntersectsSafeZone(targetX, targetY, LION_W, LION_H) && tries < 250)
}

function pushLionOutOfTimerZone(){
  if(!rectIntersectsSafeZone(lionX, lionY, LION_W, LION_H)) return

  const zone = getTimerSafeZone()

  const lionCenterX = lionX + LION_W / 2
  const lionCenterY = lionY + LION_H / 2
  const zoneCenterX = (zone.left + zone.right) / 2
  const zoneCenterY = (zone.top + zone.bottom) / 2

  let dx = lionCenterX - zoneCenterX
  let dy = lionCenterY - zoneCenterY

  if(dx === 0 && dy === 0){
    dx = 1
    dy = 1
  }

  const length = Math.sqrt(dx * dx + dy * dy)
  dx /= length
  dy /= length

  let guard = 0
  while(rectIntersectsSafeZone(lionX, lionY, LION_W, LION_H) && guard < 250){
    lionX += dx * 4
    lionY += dy * 4
    guard++
  }

  clampLionPosition()
}

function renderLion(angle = 0, facingLeft = false){
  lion.style.left = lionX + "px"
  lion.style.top = lionY + "px"

  const flip = facingLeft ? -1 : 1
  lion.style.transform = `scaleX(${flip}) rotate(${angle}deg)`
}

function placeBubble(){
  const bubbleWidth = bubble.offsetWidth || 150
  const bubbleHeight = bubble.offsetHeight || 54

  let bubbleX = lionX + 100
  let bubbleY = lionY - 20

  if(bubbleX + bubbleWidth > window.innerWidth - 10){
    bubbleX = lionX - bubbleWidth + 70
  }

  if(bubbleX < 10) bubbleX = 10
  if(bubbleY < 10) bubbleY = lionY + 10

  bubble.style.left = bubbleX + "px"
  bubble.style.top = bubbleY + "px"
}

function moveLion(){
  if(!running || paused) return

  let dx = targetX - lionX
  let dy = targetY - lionY
  let dist = Math.sqrt(dx * dx + dy * dy)

  if(dist < 18 || rectIntersectsSafeZone(targetX, targetY, LION_W, LION_H)){
    newTarget()
    dx = targetX - lionX
    dy = targetY - lionY
    dist = Math.sqrt(dx * dx + dy * dy)
  }

  const speed = 2.1

  if(dist > 0){
    const nextX = lionX + (dx / dist) * speed
    const nextY = lionY + (dy / dist) * speed

    if(!rectIntersectsSafeZone(nextX, nextY, LION_W, LION_H)){
      lionX = nextX
      lionY = nextY
    }else{
      newTarget()
    }
  }

  pushLionOutOfTimerZone()
  clampLionPosition()

  const angle = Math.atan2(dy, dx) * 180 / Math.PI * 0.08
  const facingLeft = dx < 0

  renderLion(angle, facingLeft)

  lionAnim = requestAnimationFrame(moveLion)
}

function startLion(){
  lion.style.display = "block"
  lion.classList.remove("paused")
  lion.classList.remove("star")
  lion.classList.add("skating")
  bubble.style.display = "none"

  const maxX = window.innerWidth - LION_W
  const maxY = window.innerHeight - LION_H - 25

  let tries = 0
  do{
    lionX = Math.random() * Math.max(20, maxX - 20)
    lionY = Math.random() * Math.max(20, maxY - 20)
    tries++
  }while(rectIntersectsSafeZone(lionX, lionY, LION_W, LION_H) && tries < 250)

  renderLion(0, false)
  newTarget()

  cancelAnimationFrame(lionAnim)
  lionAnim = requestAnimationFrame(moveLion)
}

function showLionStarPose(){
  cancelAnimationFrame(lionAnim)

  lion.classList.remove("paused")
  lion.classList.remove("skating")
  lion.classList.add("star")
  lion.style.display = "block"

  const sizeW = 190
  const sizeH = 170
  const maxX = window.innerWidth - sizeW
  const maxY = window.innerHeight - sizeH - 25

  let finalX = lionX
  let finalY = lionY

  if(rectIntersectsSafeZone(finalX, finalY, sizeW, sizeH)){
    const zone = getTimerSafeZone()

    const positions = [
      { x: Math.max(10, zone.left - sizeW - 20), y: Math.max(10, zone.top) },
      { x: Math.min(maxX - 10, zone.right + 20), y: Math.max(10, zone.top) },
      { x: Math.max(10, zone.left), y: Math.max(10, zone.top - sizeH - 20) },
      { x: Math.max(10, zone.left), y: Math.min(maxY - 10, zone.bottom + 20) }
    ]

    const valid = positions.find(p => !rectIntersectsSafeZone(p.x, p.y, sizeW, sizeH))

    if(valid){
      finalX = valid.x
      finalY = valid.y
    }else{
      finalX = 10
      finalY = 10
    }
  }

  lionX = Math.max(0, Math.min(maxX, finalX))
  lionY = Math.max(0, Math.min(maxY, finalY))

  lion.style.left = lionX + "px"
  lion.style.top = lionY + "px"
  lion.style.transform = "rotate(0deg) scale(1.05)"

  bubble.style.display = "block"
  placeBubble()
}

function stopLion(){
  cancelAnimationFrame(lionAnim)
  lion.style.display = "none"
  lion.classList.remove("paused")
  lion.classList.remove("star")
  lion.classList.remove("skating")
  lion.style.transform = ""
  bubble.style.display = "none"
}

function pauseLion(){
  lion.classList.add("paused")
}

function resumeLion(){
  lion.classList.remove("paused")
  cancelAnimationFrame(lionAnim)
  lionAnim = requestAnimationFrame(moveLion)
}

function runTimer(){
  if(paused) return

  time--
  timer.textContent = time

  const progress = ((total - time) / total) * 100
  bar.style.width = progress + "%"

  if(time === 15){
    playSound(midSound)
  }

  if(time <= 0){
    clearInterval(interval)
    running = false

    timer.textContent = "0"
    timer.style.color = "#f44336"
    bar.style.width = "100%"

    playSound(endSound)
    showLionStarPose()
  }
}

function startTimer(){
  clearInterval(interval)

  time = total
  paused = false
  running = true

  timer.textContent = time
  timer.style.color = "#993399"
  bar.style.width = "0%"

  playSound(startSound)
  startLion()

  interval = setInterval(runTimer, 1000)
}

function stopTimer(){
  clearInterval(interval)

  time = total
  paused = false
  running = false

  timer.textContent = total
  timer.style.color = "#993399"
  bar.style.width = "0%"

  stopLion()
}

document.addEventListener("keydown", (e) => {
  if(e.code === "Enter"){
    e.preventDefault()

    if(!running){
      startTimer()
    }else{
      stopTimer()
    }
  }

  if(e.code === "Space"){
    e.preventDefault()

    if(running){
      paused = !paused

      if(paused){
        pauseLion()
      }else{
        resumeLion()
      }
    }
  }
})

window.addEventListener("resize", () => {
  clampLionPosition()
  lion.style.left = lionX + "px"
  lion.style.top = lionY + "px"

  if(bubble.style.display === "block"){
    placeBubble()
  }

  if(running && !paused && rectIntersectsSafeZone(lionX, lionY, LION_W, LION_H)){
    newTarget()
    pushLionOutOfTimerZone()
    lion.style.left = lionX + "px"
    lion.style.top = lionY + "px"
  }
})
</script>

</body>
</html>
