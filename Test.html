<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Timer</title>

<style>

body{
margin:0;
background:white;
color:#993399;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
position:relative;
}

/* TIMER */

#timer{
font-size:22vw;
font-weight:900;
transition:transform .25s;
z-index:5;
position:relative;
}

.pulse{
transform:scale(1.15);
}

/* PROGRESS BAR */

#progressContainer{
position:absolute;
bottom:0;
width:100%;
height:25px;
background:#eee;
z-index:10;
}

#progressBar{
height:100%;
width:0%;
background:#00c853;
transition:width 1s linear;
}

/* SKATER */

#skater{
position:absolute;
width:54px;
height:90px;
display:none;
pointer-events:none;
z-index:2;
}

/* tête */

.head{
position:absolute;
top:0;
left:18px;
width:18px;
height:18px;
background:#993399;
border-radius:50%;
}

/* corps */

.torso{
position:absolute;
top:18px;
left:22px;
width:10px;
height:24px;
background:#993399;
border-radius:6px;
}

/* bras */

.arm{
position:absolute;
top:21px;
width:6px;
height:22px;
background:#993399;
transform-origin:top center;
}

.arm1{
left:15px;
animation:armMove1 .45s infinite alternate;
}

.arm2{
left:33px;
animation:armMove2 .45s infinite alternate;
}

/* jambes */

.leg{
position:absolute;
top:40px;
width:7px;
height:30px;
background:#444;
transform-origin:top center;
}

.leg1{
left:18px;
animation:legMove1 .45s infinite alternate;
}

.leg2{
left:29px;
animation:legMove2 .45s infinite alternate;
}

/* rollers */

.skate{
position:absolute;
width:18px;
height:6px;
background:#222;
border-radius:4px;
}

.skate1{
top:67px;
left:11px;
animation:legMove1 .45s infinite alternate;
}

.skate2{
top:67px;
left:27px;
animation:legMove2 .45s infinite alternate;
}

.wheel{
position:absolute;
width:5px;
height:5px;
background:#00c853;
border-radius:50%;
bottom:-4px;
animation:spin .25s linear infinite;
}

.w1{ left:2px;}
.w2{ left:10px;}
.w3{ left:2px;}
.w4{ left:10px;}

@keyframes legMove1{
from{transform:rotate(28deg)}
to{transform:rotate(-28deg)}
}

@keyframes legMove2{
from{transform:rotate(-28deg)}
to{transform:rotate(28deg)}
}

@keyframes armMove1{
from{transform:rotate(-30deg)}
to{transform:rotate(20deg)}
}

@keyframes armMove2{
from{transform:rotate(20deg)}
to{transform:rotate(-30deg)}
}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

/* étoile de mer */

.star .arm,
.star .leg,
.star .skate,
.star .wheel{
animation:none;
}

.star .arm1{ transform:rotate(-70deg);}
.star .arm2{ transform:rotate(70deg);}
.star .leg1{ transform:rotate(40deg);}
.star .leg2{ transform:rotate(-40deg);}

/* BULLE */

#bubble{
position:absolute;
background:white;
border:3px solid #993399;
border-radius:20px;
padding:10px 16px;
font-weight:bold;
font-size:20px;
display:none;
z-index:20;
}

#bubble:after{
content:"";
position:absolute;
bottom:-12px;
left:20px;
border-width:12px 12px 0;
border-style:solid;
border-color:#993399 transparent;
}

</style>
</head>
<body>

<div id="timer">30</div>

<div id="skater">

<div class="head"></div>
<div class="torso"></div>

<div class="arm arm1"></div>
<div class="arm arm2"></div>

<div class="leg leg1"></div>
<div class="leg leg2"></div>

<div class="skate skate1">
<div class="wheel w1"></div>
<div class="wheel w2"></div>
</div>

<div class="skate skate2">
<div class="wheel w3"></div>
<div class="wheel w4"></div>
</div>

</div>

<div id="bubble">Bonne année !</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>

let time = 30
const total = 30

let interval=null
let running=false
let paused=false

const timer=document.getElementById("timer")
const bar=document.getElementById("progressBar")

const skater=document.getElementById("skater")
const bubble=document.getElementById("bubble")

let x=200
let y=200
let targetX=300
let targetY=200
let anim=null

function newTarget(){

targetX=Math.random()*(window.innerWidth-100)
targetY=Math.random()*(window.innerHeight-150)

}

function moveSkater(){

if(!running || paused) return

let dx=targetX-x
let dy=targetY-y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<20) newTarget()

x+=dx*0.02
y+=dy*0.02

skater.style.left=x+"px"
skater.style.top=y+"px"

anim=requestAnimationFrame(moveSkater)

}

function startSkater(){

skater.style.display="block"

x=Math.random()*(window.innerWidth-100)
y=Math.random()*(window.innerHeight-150)

skater.style.left=x+"px"
skater.style.top=y+"px"

newTarget()
moveSkater()

}

function endPose(){

cancelAnimationFrame(anim)

skater.classList.add("star")

bubble.style.display="block"

bubble.style.left=(x+40)+"px"
bubble.style.top=(y-30)+"px"

}

function runTimer(){

if(paused) return

time--

timer.textContent=time

let progress=((total-time)/total)*100
bar.style.width=progress+"%"

if(time<=0){

clearInterval(interval)
running=false

timer.style.color="#f44336"
bar.style.width="100%"

endPose()

}

}

function startTimer(){

time=total
timer.textContent=time
timer.style.color="#993399"

bubble.style.display="none"
skater.classList.remove("star")

bar.style.width="0%"

running=true
paused=false

startSkater()

interval=setInterval(runTimer,1000)

}

function stopTimer(){

clearInterval(interval)

running=false
paused=false

time=total
timer.textContent=total
timer.style.color="#993399"

bar.style.width="0%"

skater.style.display="none"
bubble.style.display="none"

}

document.addEventListener("keydown",(e)=>{

if(e.code==="Enter"){

if(!running){
startTimer()
}else{
stopTimer()
}

}

if(e.code==="Space"){

if(running){
paused=!paused
}

}

})

</script>

</body>
</html>
