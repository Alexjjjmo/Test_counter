<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Timer</title>

<style>

body{
margin:0;
background:white;
color:#993399;
font-family:Arial, Helvetica, sans-serif;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
position:relative;
}

/* TIMER */

#timer{
font-size:45vmin;
font-weight:900;
z-index:5;
position:relative;
line-height:1;
}

/* PROGRESS BAR */

#progressContainer{
position:absolute;
bottom:0;
width:100%;
height:25px;
background:#eee;
z-index:10;
}

#progressBar{
height:100%;
width:0%;
background:#00c853;
transition:width 1s linear;
}

/* LION */

#lion{
position:absolute;
width:150px;
height:150px;
background:url("lion.png") no-repeat center;
background-size:contain;
display:none;
pointer-events:none;
z-index:3;
transform-origin:center;
}

/* animation patinage */

#lion.skating{
animation:lionBounce .35s infinite alternate ease-in-out;
}

@keyframes lionBounce{
from{margin-top:0}
to{margin-top:-6px}
}

#lion.paused{
animation-play-state:paused;
}

/* pose finale */

#lion.star{
animation:none;
transform:scale(1.1);
}

/* BULLE */

#bubble{
position:absolute;
background:white;
border:3px solid #993399;
border-radius:18px;
padding:10px 14px;
font-weight:bold;
font-size:20px;
display:none;
z-index:20;
}

#bubble:after{
content:"";
position:absolute;
left:20px;
bottom:-14px;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-top:14px solid #993399;
}

#bubble:before{
content:"";
position:absolute;
left:22px;
bottom:-10px;
border-left:8px solid transparent;
border-right:8px solid transparent;
border-top:12px solid white;
}

</style>
</head>
<body>

<div id="timer">30</div>

<div id="lion"></div>
<div id="bubble">Bonne année !</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>

/* VARIABLES */

let time = 30
const total = 30

let interval=null
let paused=false
let running=false

const timer=document.getElementById("timer")
const bar=document.getElementById("progressBar")

const startSound=document.getElementById("startSound")
const midSound=document.getElementById("midSound")
const endSound=document.getElementById("endSound")

const lion=document.getElementById("lion")
const bubble=document.getElementById("bubble")

let x=200
let y=200
let targetX=200
let targetY=200
let anim=null

/* SON */

function playSound(sound){
sound.currentTime=0
sound.play().catch(()=>{})
}

/* ZONE TIMER */

function getTimerZone(){

const rect=timer.getBoundingClientRect()
const margin=60

return{
left:rect.left-margin,
right:rect.right+margin,
top:rect.top-margin,
bottom:rect.bottom+margin
}

}

function inZone(px,py){

const z=getTimerZone()

return px>z.left && px<z.right && py>z.top && py<z.bottom

}

/* CIBLE */

function newTarget(){

do{

targetX=Math.random()*(window.innerWidth-150)
targetY=Math.random()*(window.innerHeight-150)

}while(inZone(targetX,targetY))

}

/* MOUVEMENT LION */

function moveLion(){

if(!running || paused) return

let dx=targetX-x
let dy=targetY-y

let dist=Math.sqrt(dx*dx+dy*dy)

if(dist<20) newTarget()

x+=dx*0.02
y+=dy*0.02

lion.style.left=x+"px"
lion.style.top=y+"px"

anim=requestAnimationFrame(moveLion)

}

/* START LION */

function startLion(){

lion.style.display="block"
lion.classList.remove("star")
lion.classList.remove("paused")
lion.classList.add("skating")

bubble.style.display="none"

x=Math.random()*(window.innerWidth-150)
y=Math.random()*(window.innerHeight-150)

lion.style.left=x+"px"
lion.style.top=y+"px"

newTarget()
moveLion()

}

/* FIN */

function endPose(){

cancelAnimationFrame(anim)

lion.classList.remove("skating")
lion.classList.add("star")

bubble.style.display="block"

bubble.style.left=(x+90)+"px"
bubble.style.top=(y-20)+"px"

}

/* TIMER */

function runTimer(){

if(paused) return

time--

timer.textContent=time

let progress=((total-time)/total)*100
bar.style.width=progress+"%"

if(time===15) playSound(midSound)

if(time<=0){

clearInterval(interval)
running=false

timer.textContent="0"
timer.style.color="#f44336"

bar.style.width="100%"

playSound(endSound)

endPose()

}

}

/* START TIMER */

function startTimer(){

clearInterval(interval)

time=total
paused=false
running=true

timer.textContent=time
timer.style.color="#993399"

bar.style.width="0%"

playSound(startSound)

startLion()

interval=setInterval(runTimer,1000)

}

/* RESET */

function stopTimer(){

clearInterval(interval)

running=false
paused=false

time=total

timer.textContent=total
timer.style.color="#993399"

bar.style.width="0%"

lion.style.display="none"
bubble.style.display="none"

}

/* CLAVIER */

document.addEventListener("keydown",(e)=>{

if(e.code==="Enter"){

if(!running){
startTimer()
}else{
stopTimer()
}

}

if(e.code==="Space"){

if(running){
paused=!paused
lion.classList.toggle("paused")
}

}

})

</script>

</body>
</html>
