```html
<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>HIIT Timer</title>

<style>

/* ---------- PAGE ---------- */

body{
    margin:0;
    background:white;
    color:#993399;
    font-family:Arial, Helvetica, sans-serif;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    height:100vh;
    overflow:hidden;
}

/* ---------- TIMER ---------- */

#timer{
    font-size:22vw;
    font-weight:900;          /* chiffres bien gras */
    transition:transform .25s;
}

.pulse{
    transform:scale(1.15);
}

/* ---------- START ---------- */

#startBtn{

    position:absolute;
    bottom:80px;

    font-size:28px;
    padding:15px 45px;

    border:none;
    border-radius:12px;

    background:#00c853;
    color:white;

    cursor:pointer;
    font-weight:bold;
}

/* ---------- CONTROLS ---------- */

#controls{
    margin-top:30px;
    display:none;
    gap:20px;
}

#controls button{

    font-size:22px;
    padding:12px 30px;

    border:none;
    border-radius:10px;

    cursor:pointer;
    font-weight:bold;
}

#pauseBtn{
    background:#ff9800;
    color:white;
}

#stopBtn{
    background:#f44336;
    color:white;
}

/* ---------- PROGRESS BAR ---------- */

#progressContainer{

    position:absolute;
    bottom:0;

    width:100%;
    height:25px;

    background:#eee;
}

#progressBar{

    height:100%;
    width:0%;

    background:#00c853;

    transition:width 1s linear;
}

</style>
</head>


<body>

<div id="timer">30</div>

<div id="controls">
<button id="pauseBtn">PAUSE</button>
<button id="stopBtn">STOP</button>
</div>

<button id="startBtn">START</button>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<!-- Sons -->

<audio id="startSound" src="start.wav"></audi
