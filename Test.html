<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>HIIT Timer</title>

<style>

/* PAGE */

body{
margin:0;
background:white;
color:#993399;
font-family:Arial, Helvetica, sans-serif;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

height:100vh;
overflow:hidden;
}

/* TIMER */

#timer{
font-size:22vw;
font-weight:900;
transition:transform .25s;
}

.pulse{
transform:scale(1.15);
}

/* PROGRESS BAR */

#progressContainer{

position:absolute;
bottom:0;

width:100%;
height:25px;

background:#eee;
}

#progressBar{

height:100%;
width:0%;

background:#00c853;

transition:width 1s linear;
}

</style>
</head>

<body>

<div id="timer">30</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>

/* VARIABLES */

let time = 30
const total = 30

let interval = null
let paused = false
let running = false

const timer = document.getElementById("timer")
const bar = document.getElementById("progressBar")

const startSound = document.getElementById("startSound")
const midSound = document.getElementById("midSound")
const endSound = document.getElementById("endSound")


/* TIMER */

function runTimer(){

if(paused) return

time--

timer.textContent=time

timer.classList.add("pulse")
setTimeout(()=>timer.classList.remove("pulse"),200)

let progress=((total-time)/total)*100
bar.style.width=progress+"%"

if(time===15) midSound.play()

if(time<=0){

clearInterval(interval)
running=false

timer.textContent="0"
timer.style.color="#f44336"

bar.style.width="100%"

endSound.play()

}

}


/* START */

function startTimer(){

timer.style.color="#993399"

startSound.play()

interval=setInterval(runTimer,1000)

running=true

}


/* STOP / RESET */

function stopTimer(){

clearInterval(interval)

time=total
paused=false
running=false

timer.textContent=total
timer.style.color="#993399"

bar.style.width="0%"

}


/* CLAVIER */

document.addEventListener("keydown",(e)=>{

/* ENTREE */

if(e.code==="Enter"){

e.preventDefault()

if(!running){

startTimer()

}else{

stopTimer()

}

}

/* ESPACE */

if(e.code==="Space"){

e.preventDefault()

if(running){

paused=!paused

}

}

})

</script>

</body>
</html>
