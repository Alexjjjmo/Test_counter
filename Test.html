<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HIIT Timer</title>

<style>

body {
    margin: 0;
    background: white;
    color: #993399;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

#timer {
    font-size: 25vw;
    font-weight: bold;
    transition: transform 0.25s;
}

.pulse {
    transform: scale(1.15);
}

/* START BUTTON */

#startBtn {
    position: absolute;
    bottom: 80px;
    font-size: 28px;
    padding: 15px 45px;
    border: none;
    border-radius: 12px;
    background: #00c853;
    color: white;
    cursor: pointer;
    font-weight: bold;
}

/* CONTROLS */

#controls {
    margin-top: 30px;
    display: none;
    gap: 20px;
}

#controls button {
    font-size: 22px;
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

#pauseBtn {
    background: #ff9800;
    color: white;
}

#stopBtn {
    background: #f44336;
    color: white;
}

/* PROGRESS BAR */

#progressContainer {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 25px;
    background: #eee;
}

#progressBar {
    height: 100%;
    width: 0%;
    background: #00c853;
    transition: width 1s linear;
}

</style>
</head>

<body>

<div id="timer">30</div>

<div id="controls">
<button id="pauseBtn">PAUSE</button>
<button id="stopBtn">STOP</button>
</div>

<button id="startBtn">START</button>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<!-- Sons WAV locaux -->
<audio id="startSound" src="start.wav"></audio>
<audio id="midSound" src="mid.wav"></audio>
<audio id="endSound" src="end.wav"></audio>

<script>

let time = 30;
const total = 30;

let interval;
let paused = false;

const timer = document.getElementById("timer");
const btn = document.getElementById("startBtn");
const bar = document.getElementById("progressBar");

const pauseBtn = document.getElementById("pauseBtn");
const stopBtn = document.getElementById("stopBtn");
const controls = document.getElementById("controls");

const startSound = document.getElementById("startSound");
const midSound = document.getElementById("midSound");
const endSound = document.getElementById("endSound");


/* START */

btn.onclick = () => {

    btn.style.display = "none";
    controls.style.display = "flex";

    startSound.play();

    interval = setInterval(runTimer, 1000);

};


/* TIMER */

function runTimer() {

    if (paused) return;

    time--;
    timer.textContent = time;

    timer.classList.add("pulse");
    setTimeout(() => timer.classList.remove("pulse"), 200);

    let progress = ((total - time) / total) * 100;
    bar.style.width = progress + "%";

    if (time === 15) midSound.play();

    if (time <= 0) {

        clearInterval(interval);
        timer.textContent = "0"; 
        timer.style.color = "#f44336"; // rouge
        endSound.play();

    }

}


/* PAUSE */

pauseBtn.onclick = () => {

    paused = !paused;

    pauseBtn.textContent = paused ? "RESUME" : "PAUSE";

};


/* STOP */

stopBtn.onclick = () => {

    clearInterval(interval);

    time = total;
    timer.textContent = total;

    bar.style.width = "0%";

    paused = false;
    pauseBtn.textContent = "PAUSE";

    controls.style.display = "none";
    btn.style.display = "block";

};

</script>

</body>
</html>
